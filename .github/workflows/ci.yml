name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
      - name: Lint
        run: ruff check .
      - name: Type check
        run: mypy
      - name: Tests
        run: pytest
      - name: Regression benchmark gate
        run: |
          python scripts/ci_bounded_retry.py --max-attempts 2 --sleep-seconds 3 -- \
            python scripts/run_regression_benchmark.py --min-match-rate 0.60 --min-strict-pass-rate 0.50
      - name: Test plan (CI tier)
        run: python scripts/run_test_plan.py --plan main_plan.yaml --tier ci --fail-fast
